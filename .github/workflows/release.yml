name: Release

on:
  push:
    branches:
      - main
      - beta
  workflow_dispatch:
    inputs:
      increment:
        description: "Version increment (overrides commit-based bump)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - patch
          - minor
          - major

# Ensure only one release runs per branch at a time.
# cancel-in-progress: false means a second push waits rather than cancels.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Version & release
    runs-on: ubuntu-latest
    # Skip when release-it pushes back its own "chore: release vX.Y.Z" commit,
    # which would otherwise re-trigger this workflow and loop forever.
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # RELEASE_TOKEN is a Personal Access Token with `contents: write` scope.
          # Using a PAT (instead of GITHUB_TOKEN) allows the tag push to trigger
          # the publish.yml workflow. Set it at:
          # Settings → Secrets and variables → Actions → New repository secret
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release (beta)
        if: github.ref_name == 'beta'
        run: |
          EXTRA="${{ inputs.increment != '' && format('--increment={0}', inputs.increment) || '' }}"
          bun run release -- --preRelease=beta --ci $EXTRA
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Release (stable)
        if: github.ref_name == 'main'
        run: |
          EXTRA="${{ inputs.increment != '' && format('--increment={0}', inputs.increment) || '' }}"
          bun run release -- --ci $EXTRA
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
