name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build, test & publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # CRITICAL: Allows GitHub to generate the OIDC token for npm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.9"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          # No registry-url here: we want a clean .npmrc for OIDC to work properly

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run type-check

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Resolve dist-tag & verify release tag
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$VERSION" == *alpha* ]]; then
            TAG=alpha
          elif [[ "$VERSION" == *beta* ]]; then
            TAG=beta
          elif [[ "$VERSION" == *rc* ]]; then
            TAG=rc
          else
            TAG=latest
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          RELEASE_TAG="${{ github.ref_name }}"
          EXPECTED_TAG="v$VERSION"
          if [[ "$RELEASE_TAG" != "$EXPECTED_TAG" ]]; then
            echo "::error::Release tag ($RELEASE_TAG) does not match package.json version ($EXPECTED_TAG)."
            exit 1
          fi

      - name: Fix package.json
        run: npm pkg fix

      - name: Publish to npm (tag → ${{ steps.meta.outputs.tag }})
        # No 'env: NODE_AUTH_TOKEN' needed.
        # npm will use the id-token to authenticate with the Trusted Publisher.
        run: npm publish --tag ${{ steps.meta.outputs.tag }} --provenance --access public
