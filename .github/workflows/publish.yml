name: Publish to npm

# Triggers when a GitHub Release is published.
# The release tag MUST match the version in package.json (e.g. tag "v0.2.0-alpha.2"
# for version "0.2.0-alpha.2"). The dist-tag is derived automatically:
#   *-alpha.*  → npm tag: alpha
#   *-beta.*   → npm tag: beta
#   *-rc.*     → npm tag: rc
#   (none)     → npm tag: latest
on:
  release:
    types: [published]

jobs:
  publish:
    name: Build, test & publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance attestation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.9"

      # setup-node configures ~/.npmrc with NODE_AUTH_TOKEN so npm publish works.
      # Bun is still used for everything else.
      - name: Setup Node (npm auth)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run type-check

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      # Derive the npm dist-tag from the version string and verify it matches
      # the GitHub release tag (e.g. tag "v0.2.0-alpha.2" ↔ version "0.2.0-alpha.2").
      - name: Resolve dist-tag & verify release tag
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Derive dist-tag
          if [[ "$VERSION" == *alpha* ]]; then
            TAG=alpha
          elif [[ "$VERSION" == *beta* ]]; then
            TAG=beta
          elif [[ "$VERSION" == *rc* ]]; then
            TAG=rc
          else
            TAG=latest
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Verify the GitHub release tag matches package.json version
          RELEASE_TAG="${{ github.ref_name }}"
          EXPECTED_TAG="v$VERSION"
          if [[ "$RELEASE_TAG" != "$EXPECTED_TAG" ]]; then
            echo "::error::Release tag ($RELEASE_TAG) does not match package.json version ($EXPECTED_TAG). Update package.json before releasing."
            exit 1
          fi

          echo "Publishing $VERSION with dist-tag: $TAG"

      - name: Fix package.json
        run: npm pkg fix

      - name: Publish to npm (tag → ${{ steps.meta.outputs.tag }})
        run: npm publish --tag ${{ steps.meta.outputs.tag }} --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
